<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensajes para una Princesa Real</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --tiana: #1a6b4a;
    --tiana-light: #d4f0e3;
    --tiana-mid: #2ea878;
    --diana: #4a3a8c;
    --diana-light: #e8e2f8;
    --diana-mid: #7b68d4;
    --ariel: #1a5fa0;
    --ariel-light: #d4e8f8;
    --ariel-mid: #4a9fd4;
    --merida: #b04020;
    --merida-light: #f8e0d4;
    --merida-mid: #d4602a;
    --all: #8c2a5a;
    --all-light: #f4d4e4;
    --all-mid: #c45080;
    --gold: #c8a84b;
    --gold-light: #f5ecd0;
    --cream: #fdf8f0;
    --ink: #1a150f;
    --ink-soft: #4a3f30;
    --ink-muted: #8a7a68;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(200,168,75,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(140,42,90,0.05) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 50%, rgba(26,107,74,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 3rem 1.5rem 5rem;
  }

  .hero {
    text-align: center;
    padding: 3rem 0 3.5rem;
    position: relative;
  }

  .hero::before, .hero::after {
    content: '✦';
    position: absolute;
    top: 50%;
    font-size: 14px;
    color: var(--gold);
    opacity: 0.5;
    transform: translateY(-50%);
  }
  .hero::before { left: 0; }
  .hero::after  { right: 0; }

  .hero-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1.2rem;
    display: block;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.6rem);
    font-weight: 400;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 0.8rem;
  }

  .hero-title em {
    font-style: italic;
    color: var(--all);
  }

  .hero-sub {
    font-size: 1.05rem;
    font-weight: 300;
    color: var(--ink-muted);
    letter-spacing: 0.02em;
    font-style: italic;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 2.5rem auto;
    max-width: 400px;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    opacity: 0.5;
  }
  .divider-gem { font-size: 16px; color: var(--gold); }

  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 2.5rem;
  }

  .filter-btn {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 8px 18px;
    border: 1px solid rgba(200,168,75,0.35);
    border-radius: 999px;
    background: transparent;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .filter-btn:hover {
    border-color: var(--gold);
    color: var(--ink);
    background: var(--gold-light);
  }

  .filter-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #fff;
    font-weight: 600;
  }

  .slider-wrapper { position: relative; }

  .cards-viewport {
    overflow: hidden;
    border-radius: 20px;
  }

  .cards-track {
    display: flex;
    transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1);
  }

  .msg-card {
    min-width: 100%;
    padding: 0.5rem;
  }

  .card-inner {
    background: #fff;
    border-radius: 16px;
    border: 1px solid rgba(200,168,75,0.2);
    padding: 3rem 3rem 2.5rem;
    position: relative;
    overflow: hidden;
    min-height: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    box-shadow: 0 4px 40px rgba(26,21,15,0.07);
  }

  .card-inner::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: 16px 16px 0 0;
  }
  .card-inner::after {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 200px; height: 200px;
    border-radius: 50%;
    opacity: 0.06;
  }

  .tiana .card-inner::before        { background: linear-gradient(to right, var(--tiana), var(--tiana-mid)); }
  .tiana .card-inner::after         { background: var(--tiana); }
  .diana .card-inner::before        { background: linear-gradient(to right, var(--diana), var(--diana-mid)); }
  .diana .card-inner::after         { background: var(--diana); }
  .ariel .card-inner::before        { background: linear-gradient(to right, var(--ariel), var(--ariel-mid)); }
  .ariel .card-inner::after         { background: var(--ariel); }
  .merida .card-inner::before       { background: linear-gradient(to right, var(--merida), var(--merida-mid)); }
  .merida .card-inner::after        { background: var(--merida); }
  .all-princesses .card-inner::before { background: linear-gradient(to right, var(--all), var(--all-mid)); }
  .all-princesses .card-inner::after  { background: var(--all); }

  .card-emblem {
    width: 56px; height: 56px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    margin-bottom: 1.2rem;
  }

  .tiana .card-emblem          { background: var(--tiana-light); }
  .diana .card-emblem          { background: var(--diana-light); }
  .ariel .card-emblem          { background: var(--ariel-light); }
  .merida .card-emblem         { background: var(--merida-light); }
  .all-princesses .card-emblem { background: var(--all-light); }

  .card-num {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--ink-muted);
    margin-bottom: 0.5rem;
    display: block;
  }

  .card-princess-name {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    display: block;
  }

  .tiana .card-princess-name          { color: var(--tiana); }
  .diana .card-princess-name          { color: var(--diana); }
  .ariel .card-princess-name          { color: var(--ariel); }
  .merida .card-princess-name         { color: var(--merida); }
  .all-princesses .card-princess-name { color: var(--all); }

  .card-quote {
    font-size: clamp(1.1rem, 2.5vw, 1.35rem);
    font-weight: 300;
    line-height: 1.8;
    color: var(--ink-soft);
    font-style: italic;
    max-width: 620px;
    flex: 1;
  }

  .card-quote em {
    font-style: normal;
    font-weight: 400;
    color: var(--ink);
  }

  .card-actions {
    margin-top: 2rem;
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-copy {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 9px 22px;
    border-radius: 999px;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.25s;
    background: transparent;
  }

  .tiana .btn-copy              { color: var(--tiana);  border-color: var(--tiana);  }
  .tiana .btn-copy:hover        { background: var(--tiana);  color: #fff; }
  .diana .btn-copy              { color: var(--diana);  border-color: var(--diana);  }
  .diana .btn-copy:hover        { background: var(--diana);  color: #fff; }
  .ariel .btn-copy              { color: var(--ariel);  border-color: var(--ariel);  }
  .ariel .btn-copy:hover        { background: var(--ariel);  color: #fff; }
  .merida .btn-copy             { color: var(--merida); border-color: var(--merida); }
  .merida .btn-copy:hover       { background: var(--merida); color: #fff; }
  .all-princesses .btn-copy     { color: var(--all);    border-color: var(--all);    }
  .all-princesses .btn-copy:hover { background: var(--all); color: #fff; }

  .nav-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 2rem;
  }

  .nav-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid rgba(200,168,75,0.4);
    background: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-soft);
    font-size: 18px;
    transition: all 0.25s;
    box-shadow: 0 2px 12px rgba(26,21,15,0.06);
  }

  .nav-btn:hover:not(:disabled) {
    border-color: var(--gold);
    background: var(--gold);
    color: #fff;
    box-shadow: 0 4px 20px rgba(200,168,75,0.3);
  }

  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .nav-counter {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--ink-muted);
    min-width: 70px;
    text-align: center;
  }

  .dots {
    display: flex;
    gap: 7px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 1.5rem;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(200,168,75,0.25);
    border: 1px solid rgba(200,168,75,0.3);
    cursor: pointer;
    transition: all 0.3s;
  }

  .dot.active {
    background: var(--gold);
    border-color: var(--gold);
    transform: scale(1.3);
  }

  .progress-bar {
    height: 2px;
    background: rgba(200,168,75,0.15);
    border-radius: 2px;
    margin-top: 1.5rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(to right, var(--gold), var(--all-mid));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .footer {
    text-align: center;
    margin-top: 4rem;
    padding-top: 2rem;
    border-top: 1px solid rgba(200,168,75,0.2);
  }

  .footer p {
    font-size: 0.85rem;
    color: var(--ink-muted);
    font-style: italic;
    letter-spacing: 0.04em;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .page { animation: fadeSlideUp 0.7s ease both; }

  .key-hint {
    text-align: center;
    font-size: 11px;
    color: var(--ink-muted);
    letter-spacing: 0.08em;
    margin-top: 0.8rem;
    font-family: 'Cinzel', serif;
  }

  @media (max-width: 600px) {
    .card-inner { padding: 2rem 1.5rem 1.8rem; min-height: 380px; }
    .hero-title { font-size: 1.9rem; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="hero">
    <span class="hero-eyebrow">Dedicatorias especiales</span>
    <h1 class="hero-title">Para una <em>Princesa Real</em></h1>
    <p class="hero-sub">Mensajes Inspirados en Princesas Animadas</p>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-gem">✦</div>
    <div class="divider-line"></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">Todas</button>
    <button class="filter-btn" onclick="setFilter('tiana', this)">Tiana</button>
    <button class="filter-btn" onclick="setFilter('diana', this)">Diana</button>
    <button class="filter-btn" onclick="setFilter('ariel', this)">Ariel</button>
    <button class="filter-btn" onclick="setFilter('merida', this)">Mérida</button>
  </div>

  <div class="slider-wrapper">
    <div class="cards-viewport">
      <div class="cards-track" id="track"></div>
    </div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progress"></div>
  </div>

  <div class="nav-row">
    <button class="nav-btn" id="prev" onclick="goTo(current - 1)" title="Anterior">&#8592;</button>
    <span class="nav-counter" id="counter">1 / 20</span>
    <button class="nav-btn" id="next" onclick="goTo(current + 1)" title="Siguiente">&#8594;</button>
  </div>

  <div class="dots" id="dots"></div>

  <p class="key-hint">← → Flechas del teclado para navegar</p>

  <div class="footer">
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-gem">♛</div>
      <div class="divider-line"></div>
    </div>
    <p>Creado con amor para una mujer valiente y emprendedora</p>
  </div>

</div>

<script>
const ALL_MESSAGES = [
  { num:1, cat:'tiana', cls:'tiana', icon:'🌿', princess:'Inspirada en Tiana',
    text:'Como Tiana, sabes que los sueños no se le piden a una estrella: se construyen con las manos, se riegan con esfuerzo y se cosechan con el corazón puesto en cada detalle. Tú eres la prueba viva de que lo que se gana con trabajo propio tiene <em>un sabor que nada más puede igualar</em>.' },
  { num:2, cat:'merida', cls:'merida', icon:'🏹', princess:'Inspirada en Mérida',
    text:'Mérida nunca esperó que alguien escribiera su historia, y tú tampoco lo has hecho. Desde siempre has tomado el arco con firmeza, apuntado al horizonte y disparado sin dudar. Esa libertad que llevas dentro no es rebeldía, <em>es carácter</em>, y es una de las cosas más hermosas que te definen.' },
  { num:3, cat:'ariel', cls:'ariel', icon:'🐚', princess:'Inspirada en Ariel',
    text:'Hay algo en ti que recuerda a Ariel: esa curiosidad que no se apaga, esas ganas de conocer lo que está más allá, de tocar lo que otros ni siquiera se atreven a imaginar. No le has tenido miedo a lo desconocido, y por eso <em>tu mundo es mucho más grande que el de la mayoría</em>.' },
  { num:4, cat:'diana', cls:'diana', icon:'👑', princess:'Inspirada en Diana',
    text:'La princesa Diana le enseñó al mundo que la verdadera realeza no vive en los palacios sino en el corazón de quienes eligen servir con amor. Tú tienes ese mismo don: donde llegas, algo cambia para bien. <em>Tu presencia transforma</em>, y eso vale más que cualquier corona.' },
  { num:5, cat:'tiana', cls:'tiana', icon:'🌿', princess:'Inspirada en Tiana',
    text:'Tiana levantó su sueño cuando todo parecía cerrarle el camino, y lo hizo a su manera, sin atajos y sin rendirse. Tú has hecho exactamente lo mismo. Cada proyecto que has iniciado, cada idea que has convertido en realidad, <em>lleva tu firma</em>. Ese espíritu emprendedor es tu corona más auténtica.' },
  { num:6, cat:'merida', cls:'merida', icon:'🏹', princess:'Inspirada en Mérida',
    text:'No naciste para caminar por senderos que otros trazaron. Como Mérida, tienes la valentía de abrirte paso donde no hay ruta, de encontrar el camino cuando el bosque parece cerrado. <em>Tu determinación no conoce muros</em>, y eso te convierte en alguien verdaderamente extraordinaria.' },
  { num:7, cat:'ariel', cls:'ariel', icon:'🐚', princess:'Inspirada en Ariel',
    text:'Ariel guardaba con cariño cada cosa que encontraba, esperando el momento de darle sentido. Tú haces algo parecido con tus sueños: los cuidas, los alimentas y cuando llega el momento, los vives con todo. <em>Cada meta que alcanzas fue primero una chispa que te negaste a apagar</em>.' },
  { num:8, cat:'diana', cls:'diana', icon:'👑', princess:'Inspirada en Diana',
    text:'Diana supo caminar por el mundo con una gracia que no excluía la fortaleza. Tú tienes esa misma dualidad: puedes ser el abrazo más cálido y al mismo tiempo la roca más firme. <em>No muchas personas logran eso</em>, y tú lo llevas como algo completamente natural.' },
  { num:9, cat:'tiana', cls:'tiana', icon:'🌿', princess:'Inspirada en Tiana',
    text:'Hay un tipo de princesa que espera ser rescatada, y hay otro tipo que decide rescatarse a sí misma. Tú siempre has sido del segundo. Como Tiana, tu fuerza no depende de nadie más, <em>nace de adentro, crece con cada experiencia</em> y no para de sorprender a quienes te conocen.' },
  { num:10, cat:'merida', cls:'merida', icon:'🏹', princess:'Inspirada en Mérida',
    text:'Ser valiente no significa no sentir miedo. Mérida lo sabía, y tú también lo vives así. Lo admirable en ti es que avanzas de todas formas, con el corazón acelerado si hace falta, pero sin detenerte. <em>Eso es coraje real, el tipo que no se aprende, el que simplemente se tiene</em>.' },
  { num:11, cat:'ariel', cls:'ariel', icon:'🐚', princess:'Inspirada en Ariel',
    text:'Como Ariel, siempre has tenido la certeza de que hay algo más esperándote al otro lado del horizonte. Y en lugar de quedarte mirando, has nadado hacia allá. Tu espíritu aventurero te ha llevado a lugares que otros apenas imaginan, <em>y aún te quedan muchos por descubrir</em>.' },
  { num:12, cat:'diana', cls:'diana', icon:'👑', princess:'Inspirada en Diana',
    text:'Diana usó su voz para hablar por quienes no podían hacerlo, y convirtió su historia en un puente hacia los demás. Tú también tienes ese instinto de construir, de alzar, de no quedarte con los brazos cruzados cuando alguien necesita ayuda. <em>Eso es nobleza en su forma más pura</em>.' },
  { num:13, cat:'tiana', cls:'tiana', icon:'🌿', princess:'Inspirada en Tiana',
    text:'Tiana conoció el rechazo, las puertas cerradas y los sueños puestos en pausa, y aun así no se dobló. Tú tampoco lo has hecho. Cada obstáculo que superaste lleva tu sello, y cada logro que alcanzaste tiene tu nombre. <em>Nadie te regaló nada, y por eso todo lo que tienes brilla diferente</em>.' },
  { num:14, cat:'merida', cls:'merida', icon:'🏹', princess:'Inspirada en Mérida',
    text:'No necesitas que nadie te rescate, ni que nadie te elija, ni que nadie te dé permiso. Como Mérida, eres completamente tuya. Esa independencia que has construido con tanto cuidado no es distancia, <em>es dignidad</em>, y es uno de los regalos más grandes que te has dado a ti misma.' },
  { num:15, cat:'ariel', cls:'ariel', icon:'🐚', princess:'Inspirada en Ariel',
    text:'Ariel cambió su voz por una oportunidad, pero la tuya no tiene precio y no está en venta. Lo que piensas, lo que propones, la forma en que ves las cosas, todo eso mueve el mundo a tu alrededor. <em>Que nunca nadie ni nada te quite esa voz</em>, porque cuando habla, vale la pena escuchar.' },
  { num:16, cat:'diana', cls:'diana', icon:'👑', princess:'Inspirada en Diana',
    text:'Había algo en Diana que iluminaba cualquier lugar sin que ella lo buscara. Tú tienes eso mismo. No necesitas un escenario ni un título para dejar huella, te basta con estar presente, con mirar a los ojos, con preguntar cómo están de verdad. <em>Esa luz tuya es silenciosa y poderosa al mismo tiempo</em>.' },
  { num:17, cat:'tiana', cls:'tiana', icon:'🌿', princess:'Inspirada en Tiana',
    text:'Tiana nos dejó una lección que no se olvida: soñar no es suficiente si no vas detrás. Y tú lo entiendes mejor que nadie. Cada madrugada con propósito, cada decisión difícil, cada paso dado cuando el camino no era fácil, todo eso te trajo hasta aquí. <em>Y esto, todavía, es solo el principio</em>.' },
  { num:18, cat:'merida', cls:'merida', icon:'🏹', princess:'Inspirada en Mérida',
    text:'Las flechas de Mérida no fallaban porque apuntaba con intención, con presencia, con toda ella enfocada en el blanco. Tú haces lo mismo en todo lo que emprendes. Cuando decides ir por algo, no hay distracción que te desvíe ni obstáculo que te haga bajar el arco. <em>El mundo simplemente se aparta</em>.' },
  { num:19, cat:'ariel', cls:'ariel', icon:'🐚', princess:'Inspirada en Ariel',
    text:'Como Ariel, llevas dentro un universo entero que no siempre se ve a simple vista pero que está ahí, rico y lleno de vida. Cada vez que te permites ser completamente tú misma, sin filtros y sin disculpas, <em>ese mundo sale a la superficie y deja a todos sin palabras</em>.' },
  { num:20, cat:'all', cls:'all-princesses', icon:'✨', princess:'Las cuatro princesas unidas',
    text:'Tienes la determinación trabajadora de Tiana, la valentía sin permiso de Mérida, la curiosidad sin fronteras de Ariel y el corazón generoso de Diana. No eres el reflejo de una sola princesa: <em>eres lo mejor de todas ellas reunido en una sola persona</em>. Y eso no es poca cosa. Eso es todo.' }
];

let current = 0;
let filtered = [...ALL_MESSAGES];

function setFilter(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtered = cat === 'all' ? [...ALL_MESSAGES] : ALL_MESSAGES.filter(m => m.cat === cat);
  current = 0;
  renderAll();
}

function renderAll() {
  renderCards();
  renderDots();
  updateNav();
}

function renderCards() {
  const track = document.getElementById('track');
  track.innerHTML = filtered.map((m, i) => `
    <div class="msg-card ${m.cls}" data-idx="${i}">
      <div class="card-inner">
        <div class="card-emblem">${m.icon}</div>
        <span class="card-num">Mensaje ${m.num} de 20</span>
        <span class="card-princess-name">${m.princess}</span>
        <p class="card-quote">${m.text}</p>
        <div class="card-actions">
          <button class="btn-copy" onclick="copyMsg(${i})">Copiar mensaje</button>
        </div>
      </div>
    </div>
  `).join('');
  goTo(0, false);
}

function renderDots() {
  const dots = document.getElementById('dots');
  dots.innerHTML = filtered.map((_, i) => `
    <div class="dot ${i === current ? 'active' : ''}" onclick="goTo(${i})" title="Mensaje ${i+1}"></div>
  `).join('');
}

function updateNav() {
  const total = filtered.length;
  document.getElementById('counter').textContent = `${current + 1} / ${total}`;
  document.getElementById('prev').disabled = current === 0;
  document.getElementById('next').disabled = current === total - 1;
  const pct = total > 1 ? (current / (total - 1)) * 100 : 100;
  document.getElementById('progress').style.width = pct + '%';
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
  document.getElementById('track').style.transform = `translateX(-${current * 100}%)`;
}

function goTo(idx, animate = true) {
  if (idx < 0 || idx >= filtered.length) return;
  current = idx;
  if (!animate) {
    const track = document.getElementById('track');
    track.style.transition = 'none';
    setTimeout(() => { track.style.transition = ''; }, 50);
  }
  updateNav();
}

function copyMsg(idx) {
  const plain = filtered[idx].text.replace(/<[^>]+>/g, '');
  navigator.clipboard.writeText(plain).then(() => {
    const btn = document.querySelectorAll('.btn-copy')[idx];
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = '¡Copiado! ✓';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    }
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  goTo(current - 1);
  if (e.key === 'ArrowRight') goTo(current + 1);
});

let touchStartX = 0;
document.body.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.body.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) dx < 0 ? goTo(current + 1) : goTo(current - 1);
}, { passive: true });

renderAll();
</script>
</body>
</html>
